# =============================================================================
#  docker-compose.transportes.yml  —  Tarea 2
#
#  Levanta el sistema con:
#    docker compose -f docker-compose.transportes.yml up -d --build
#
#  Incluye:
#   - PostgreSQL + Redis (Tarea 1)
#   - RabbitMQ (segundo transporte de mensajería)
#   - gRPC directo entre Gateway y Libros
# =============================================================================
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: biblioteca
      POSTGRES_PASSWORD: biblioteca
      POSTGRES_DB: postgres
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblioteca -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  libros:
    build:
      context: .
      dockerfile: apps/libros/Dockerfile
    environment:
      TCP_PORT: 4001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: biblioteca
      DB_PASS: biblioteca
      DB_NAME: biblioteca_libros
      GRPC_PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prestamos:
    build:
      context: .
      dockerfile: apps/prestamos/Dockerfile
    environment:
      TCP_PORT: 4002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: biblioteca
      DB_PASS: biblioteca
      DB_NAME: biblioteca_prestamos
      LIBROS_TCP_HOST: libros
      LIBROS_TCP_PORT: 4001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      libros:
        condition: service_started
    restart: unless-stopped

  notificaciones:
    build:
      context: .
      dockerfile: apps/notificaciones/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: biblioteca
      DB_PASS: biblioteca
      DB_NAME: biblioteca_notificaciones
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    environment:
      PORT: 3000
      LIBROS_TCP_HOST: libros
      LIBROS_TCP_PORT: 4001
      PRESTAMOS_TCP_HOST: prestamos
      PRESTAMOS_TCP_PORT: 4002
      LIBROS_GRPC_HOST: libros
      LIBROS_GRPC_PORT: 5000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports: ["3000:3000"]
    depends_on:
      libros:
        condition: service_started
      prestamos:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
